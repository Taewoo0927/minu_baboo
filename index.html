<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f5f5f5" />
  <title>임민우 바보 (10분만)</title>
  <style>
    :root{
      --bg:#f3f3f3; --card:#ffffff; --muted:#757575; --text:#111111;
      --border:#e7e7e7; --soft:#fafafa; --shadow:0 8px 24px rgba(0,0,0,.05);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:430px;margin:0 auto;min-height:100vh;padding:20px 16px 96px}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
    h1{margin:0;font-size:30px;line-height:1.1}
    .sub{margin-top:6px;color:var(--muted);font-size:14px}
    .card{background:var(--card);border-radius:28px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
    .title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;margin:0 0 10px}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .large-number{font-size:34px;font-weight:800}
    .btn{border:none;background:#111;color:#fff;border-radius:18px;padding:12px 14px;font-size:15px;font-weight:700;min-height:44px;cursor:pointer}
    .btn.secondary{background:#efefef;color:#111}
    .btn.ghost{background:transparent;color:#111}
    .btn:disabled{opacity:.45}
    .row{display:flex;gap:10px}
    .row > *{flex:1}
    input, textarea{width:100%;border:none;background:var(--soft);border-radius:18px;padding:13px 14px;font-size:15px;color:#111;outline:none}
    textarea{min-height:180px;resize:none}
    .task{display:flex;align-items:center;gap:12px;justify-content:space-between;background:var(--soft);border-radius:18px;padding:12px 12px;margin-top:8px}
    .task-main{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
    .dot{width:20px;height:20px;border-radius:999px;border:1.6px solid #cfcfcf;flex-shrink:0}
    .dot.done{background:#111;border-color:#111}
    .task-text{font-size:14px;word-break:break-word}
    .done-text{text-decoration:line-through;color:#a0a0a0}
    .icon-btn{border:none;background:transparent;border-radius:12px;padding:8px;cursor:pointer;color:#888}
    .soft-box{background:var(--soft);border-radius:24px;padding:18px}
    .timer{font-size:48px;font-weight:800;text-align:center;letter-spacing:-1px}
    .center{text-align:center}
    .step-indicator{color:var(--muted);font-size:12px;margin-bottom:4px}
    .tabbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-top:1px solid var(--border)}
    .tabwrap{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);padding:10px 14px}
    .tab{border:none;background:transparent;padding:8px 6px;border-radius:18px;color:#9a9a9a;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;cursor:pointer}
    .tab.active{color:#111}
    .badge{font-size:26px;line-height:1}
    .space-y-10 > * + *{margin-top:10px}
    .hidden{display:none!important}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>임민우 바보 (10분만)</h1>
        <div class="sub" id="dateLabel"></div>
      </div>
      <button class="btn ghost hidden" id="backHomeBtn">←</button>
    </div>

    <div id="homeTab">
      <div class="card">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
          <div>
            <div class="muted" style="font-size:14px;">오늘 진행</div>
            <div class="large-number" id="progressText">0/0</div>
            <div class="small muted" id="doneCountText">전체 작은 완료 0개</div>
          </div>
          <button class="btn" id="startFlowBtn" style="flex-shrink:0;">루프 끊기</button>
        </div>
        <div class="soft-box" style="margin-top:14px;">
          <div class="muted" style="font-size:14px;">지금 추천</div>
          <div id="suggestedTaskText" style="margin-top:8px;font-size:22px;font-weight:800;line-height:1.3;">오늘 할 일을 하나 추가해봐.</div>
        </div>
      </div>

      <div class="card">
        <div class="title">📅 오늘 할 일</div>
        <div class="space-y-10">
          <div class="row">
            <input type="date" id="selectedDate" />
            <button class="btn secondary" id="copyPrevBtn">전날 복사</button>
          </div>
          <div class="row">
            <input id="taskInput" placeholder="할 일 추가" />
            <button class="btn" id="addTaskBtn" style="max-width:56px;">＋</button>
          </div>
          <div id="taskList"></div>
        </div>
      </div>
    </div>

    <div id="flowTab" class="hidden"></div>

    <div id="recordsTab" class="hidden">
      <div class="card">
        <div class="title">✨ 머릿속 기록</div>
        <input type="date" id="recordDate" />
        <div id="brainDumpList" style="margin-top:10px;"></div>
      </div>
      <div class="card">
        <div class="title">🔔 알림</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:14px;font-weight:700;">상태</div>
          <div class="small muted" id="notifStatus">미설정</div>
        </div>
        <div class="row">
          <button class="btn secondary" id="requestNotifBtn">알림 허용</button>
          <button class="btn secondary" id="testNotifBtn">테스트</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tabbar">
    <div class="tabwrap">
      <button class="tab active" data-tab="home"><span class="badge">🏠</span><span>홈</span></button>
      <button class="tab" data-tab="flow"><span class="badge">🧠</span><span>루프 끊기</span></button>
      <button class="tab" data-tab="records"><span class="badge">📝</span><span>기록</span></button>
    </div>
  </div>

<script>
const STORAGE_KEY = "loop-breaker-html-v2";
const TEN_MINUTES = 600;
const BREATHING_SECONDS = 15;
const starterTexts = ["답장 1개 보내기","파일 1개 열기","책상 5분 정리하기","물 한잔 마시기","샤워하기"];

const state = {
  activeTab: "home",
  currentStep: "reset", // reset, pick, timer, dump, done
  selectedDate: todayLocal(),
  tasks: [],
  brainDumps: [],
  doneCount: 0,
  selectedTaskId: "",
  brainDumpDraft: "",
  timerSeconds: TEN_MINUTES,
  timerRunning: false,
  breathingSeconds: BREATHING_SECONDS,
  breathingRunning: false,
};

let timerInterval = null;
let breathingInterval = null;

function todayLocal(){
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
}
function formatDateLabel(date){
  return new Date(date + "T00:00:00").toLocaleDateString("ko-KR",{month:"long",day:"numeric",weekday:"short"});
}
function formatTime(seconds){
  const m = Math.floor(seconds/60);
  const s = seconds % 60;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function id(){ return `${Date.now()}-${Math.random().toString(36).slice(2,7)}`; }
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    tasks: state.tasks,
    brainDumps: state.brainDumps,
    doneCount: state.doneCount,
    selectedDate: state.selectedDate
  }));
}
function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{
      const parsed = JSON.parse(raw);
      state.tasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
      state.brainDumps = Array.isArray(parsed.brainDumps) ? parsed.brainDumps : [];
      state.doneCount = typeof parsed.doneCount === "number" ? parsed.doneCount : 0;
      state.selectedDate = typeof parsed.selectedDate === "string" ? parsed.selectedDate : todayLocal();
    }catch(e){}
  }
  if(!state.tasks.length){
    state.tasks = starterTexts.map((text, index)=>({
      id:id(), text, date:state.selectedDate, completed:false, createdAt:Date.now()+index
    }));
  }
}
function tasksForDate(date){
  return state.tasks.filter(t=>t.date===date).sort((a,b)=>(Number(a.completed)-Number(b.completed)) || (a.createdAt-b.createdAt));
}
function brainDumpsForDate(date){
  return state.brainDumps.filter(b=>b.date===date).sort((a,b)=>b.createdAt-a.createdAt);
}
function suggestedTask(){
  const avail = tasksForDate(state.selectedDate).filter(t=>!t.completed);
  if(!avail.length) return null;
  return [...avail].sort((a,b)=>a.text.length-b.text.length)[0];
}
function currentSelectedTask(){
  return state.tasks.find(t=>t.id===state.selectedTaskId) || null;
}
function setTab(tab){ state.activeTab = tab; render(); }
function startFlow(){
  state.activeTab = "flow";
  state.currentStep = "reset";
  state.selectedTaskId = "";
  state.brainDumpDraft = "";
  resetTimer();
  resetBreathing();
  render();
}
function resetTimer(){
  state.timerRunning = false;
  state.timerSeconds = TEN_MINUTES;
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
}
function pauseTimer(){
  state.timerRunning = false;
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  render();
}
function resetBreathing(){
  state.breathingRunning = false;
  state.breathingSeconds = BREATHING_SECONDS;
  if(breathingInterval) clearInterval(breathingInterval);
  breathingInterval = null;
}
function startBreathing(){
  if(state.breathingRunning) return;
  state.breathingRunning = true;
  if(state.breathingSeconds <= 0) state.breathingSeconds = BREATHING_SECONDS;
  render();
  breathingInterval = setInterval(()=>{
    state.breathingSeconds -= 1;
    if(state.breathingSeconds <= 0){
      state.breathingSeconds = 0;
      state.breathingRunning = false;
      clearInterval(breathingInterval);
      breathingInterval = null;
    }
    render();
  },1000);
}
function startTimer(){
  if(state.timerRunning || !state.selectedTaskId) return;
  state.timerRunning = true;
  if(state.timerSeconds <= 0) state.timerSeconds = TEN_MINUTES;
  render();
  timerInterval = setInterval(()=>{
    state.timerSeconds -= 1;
    if(state.timerSeconds <= 0){
      state.timerSeconds = 0;
      state.timerRunning = false;
      clearInterval(timerInterval);
      timerInterval = null;
      notify("10분 끝났어", currentSelectedTask() ? currentSelectedTask().text + " 체크해봐." : "지금 한 일 완료 체크해봐.");
      state.currentStep = "dump";
    }
    render();
  },1000);
}
function completeTimerStep(){
  pauseTimer();
  state.currentStep = "dump";
  render();
}
function saveBrainDumpAndContinue(){
  const el = document.getElementById("brainDumpDraft");
  const value = (el ? el.value : state.brainDumpDraft).trim();
  if(value){
    state.brainDumps.unshift({ id:id(), date:state.selectedDate, text:value, createdAt:Date.now() });
  }
  state.brainDumpDraft = "";
  save();
  state.currentStep = "done";
  render();
}
function chooseSuggested(){
  const t = suggestedTask();
  if(!t) return;
  state.selectedTaskId = t.id;
  state.currentStep = "timer";
  resetTimer();
  render();
}
function completeTaskMark(){
  if(state.selectedTaskId){
    const task = currentSelectedTask();
    if(task && !task.completed) task.completed = true;
  }
  state.doneCount += 1;
  save();
}
function notify(title, body){
  if(!("Notification" in window)) return;
  if(Notification.permission !== "granted") return;
  new Notification(title, { body });
}
function notifStatus(){
  if(!("Notification" in window)) return "미지원";
  if(Notification.permission === "granted") return "허용됨";
  if(Notification.permission === "denied") return "차단됨";
  return "미설정";
}
function renderFlow(){
  const selected = currentSelectedTask();
  const suggestion = suggestedTask();
  const uncompleted = tasksForDate(state.selectedDate).filter(t=>!t.completed);

  if(state.currentStep === "reset"){
    return `
      <div class="card">
        <div class="step-indicator">1 / 4</div>
        <div class="title" style="font-size:28px;">⏳ 1단계. 숨 고르기</div>
        <div class="muted" style="font-size:14px;margin-bottom:14px;">15초 숨쉬기.</div>
        <div class="soft-box center">
          <div class="muted" style="font-size:14px;">15초 타이머</div>
          <div class="timer">${formatTime(state.breathingSeconds)}</div>
          <div class="row" style="margin-top:12px;">
            <button class="btn" onclick="startBreathing()" ${state.breathingRunning ? "disabled":""}>시작</button>
            <button class="btn secondary" onclick="resetBreathing();render()">리셋</button>
          </div>
        </div>
        <button class="btn" style="width:100%;margin-top:14px;" onclick="state.currentStep='pick';render()">다음</button>
      </div>
    `;
  }

  if(state.currentStep === "pick"){
    return `
      <div class="card">
        <div class="step-indicator">2 / 4</div>
        <div class="title" style="font-size:28px;">🧠 2단계. 지금 할 1개</div>
        <div class="muted" style="font-size:14px;margin-bottom:14px;">생각 정리할겸 작은거 하나 하기</div>

        <div class="soft-box">
          <div class="muted" style="font-size:14px;">앱 추천</div>
          <div style="margin-top:8px;font-size:24px;font-weight:800;line-height:1.35;">${suggestion ? escapeHtml(suggestion.text) : "완료 안 된 할 일을 하나 추가해봐."}</div>
        </div>

        <div class="space-y-10" style="margin-top:12px;">
          <button class="btn" style="width:100%;" onclick="chooseSuggested()" ${suggestion ? "" : "disabled"}>이거 하기</button>
          <button class="btn secondary" style="width:100%;" onclick="state.selectedTaskId='';state.currentStep='timer';resetTimer();render()">직접 고르기</button>
          <button class="btn ghost" style="width:100%;" onclick="state.currentStep='reset';render()">이전</button>
        </div>
      </div>
    `;
  }

  if(state.currentStep === "timer"){
    return `
      <div class="card">
        <div class="step-indicator">3 / 4</div>
        <div class="title" style="font-size:28px;">▶️ 3단계. 10분 타이머</div>
        <div class="muted" style="font-size:14px;margin-bottom:14px;">10분만 하고 다음으로 넘어가기</div>

        ${selected ? `
          <div class="soft-box">
            <div class="muted" style="font-size:14px;">지금 할 일</div>
            <div style="margin-top:8px;font-size:24px;font-weight:800;line-height:1.35;">${escapeHtml(selected.text)}</div>
          </div>
        ` : `
          <div style="max-height:240px;overflow:auto;">
            ${uncompleted.map(task=>`
              <button class="task" style="width:100%;border:none;cursor:pointer;" onclick="state.selectedTaskId='${task.id}';render()">
                <div class="task-main"><div class="task-text">${escapeHtml(task.text)}</div></div>
              </button>
            `).join("") || `<div class="soft-box muted">완료 안 된 할 일이 없어.</div>`}
          </div>
        `}

        <div class="soft-box center" style="margin-top:12px;">
          <div class="muted" style="font-size:14px;">10분 타이머</div>
          <div class="timer">${formatTime(state.timerSeconds)}</div>
          <div class="row" style="margin-top:12px;">
            <button class="btn" onclick="startTimer()" ${(!state.selectedTaskId || state.timerRunning) ? "disabled":""}>시작</button>
            <button class="btn secondary" onclick="pauseTimer()" ${state.timerRunning ? "" : "disabled"}>일시정지</button>
            <button class="btn secondary" onclick="resetTimer();render()">리셋</button>
          </div>
        </div>

        <div class="space-y-10" style="margin-top:12px;">
          <button class="btn" style="width:100%;" onclick="completeTaskMark(); completeTimerStep();" ${state.selectedTaskId ? "" : "disabled"}>10분 완료</button>
          <button class="btn ghost" style="width:100%;" onclick="state.currentStep='pick';render()">이전</button>
        </div>
      </div>
    `;
  }

  if(state.currentStep === "dump"){
    return `
      <div class="card">
        <div class="step-indicator">4 / 4</div>
        <div class="title" style="font-size:28px;">✨ 4단계. 머릿속 빼내기</div>
        <div class="muted" style="font-size:14px;margin-bottom:14px;">지금 걸리는 생각 적기.</div>
        <textarea id="brainDumpDraft" placeholder="민우 머릿속에 있는거 아무거나 적어줘">${state.brainDumpDraft || ""}</textarea>
        <div class="row" style="margin-top:12px;">
          <button class="btn secondary" onclick="state.currentStep='timer';render()">이전</button>
          <button class="btn" onclick="saveBrainDumpAndContinue()">저장 후 다음</button>
        </div>
      </div>
    `;
  }

  return `
    <div class="card center">
      <div style="font-size:52px;">✅</div>
      <div style="font-size:26px;font-weight:800;margin-top:10px;">잘했어</div>
      <div class="space-y-10" style="margin-top:14px;">
        <button class="btn" style="width:100%;" onclick="startFlow()">한개 더 할래?</button>
        <button class="btn secondary" style="width:100%;" onclick="setTab('home')">비우기 완료</button>
      </div>
    </div>
  `;
}
function render(){
  save();
  document.getElementById("dateLabel").textContent = formatDateLabel(state.selectedDate);
  document.getElementById("selectedDate").value = state.selectedDate;
  document.getElementById("recordDate").value = state.selectedDate;
  document.getElementById("notifStatus").textContent = notifStatus();
  document.getElementById("backHomeBtn").classList.toggle("hidden", state.activeTab !== "flow");

  document.getElementById("homeTab").classList.toggle("hidden", state.activeTab !== "home");
  document.getElementById("flowTab").classList.toggle("hidden", state.activeTab !== "flow");
  document.getElementById("recordsTab").classList.toggle("hidden", state.activeTab !== "records");

  document.querySelectorAll(".tab").forEach(btn=>btn.classList.toggle("active", btn.dataset.tab === state.activeTab));

  const todayTasks = tasksForDate(state.selectedDate);
  const doneToday = todayTasks.filter(t=>t.completed).length;
  document.getElementById("progressText").textContent = `${doneToday}/${todayTasks.length}`;
  document.getElementById("doneCountText").textContent = `전체 작은 완료 ${state.doneCount}개`;

  const suggestion = suggestedTask();
  document.getElementById("suggestedTaskText").textContent = suggestion ? suggestion.text : "오늘 할 일을 하나 추가해봐.";

  const taskList = document.getElementById("taskList");
  if(!todayTasks.length){
    taskList.innerHTML = `<div class="soft-box muted">이 날짜에는 아직 할 일이 없어.</div>`;
  }else{
    taskList.innerHTML = todayTasks.map(task=>`
      <div class="task">
        <button class="task-main" style="border:none;background:transparent;padding:0;cursor:pointer;" onclick="toggleTask('${task.id}')">
          <div class="dot ${task.completed ? "done" : ""}"></div>
          <div class="task-text ${task.completed ? "done-text" : ""}">${escapeHtml(task.text)}</div>
        </button>
        <button class="icon-btn" onclick="removeTask('${task.id}')">🗑️</button>
      </div>
    `).join("");
  }

  const dumps = brainDumpsForDate(state.selectedDate);
  const dumpList = document.getElementById("brainDumpList");
  if(!dumps.length){
    dumpList.innerHTML = `<div class="soft-box muted">이 날짜에는 저장된 머릿속 기록이 아직 없어.</div>`;
  }else{
    dumpList.innerHTML = dumps.map(entry=>`
      <div class="task" style="display:block;">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
          <div style="white-space:pre-wrap;font-size:14px;line-height:1.5;">${escapeHtml(entry.text)}</div>
          <button class="icon-btn" onclick="removeBrainDump('${entry.id}')">🗑️</button>
        </div>
        <div class="small muted" style="margin-top:8px;">${new Date(entry.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
      </div>
    `).join("");
  }

  document.getElementById("flowTab").innerHTML = renderFlow();
}
function addTask(){
  const input = document.getElementById("taskInput");
  const value = input.value.trim();
  if(!value) return;
  state.tasks.unshift({ id:id(), text:value, date:state.selectedDate, completed:false, createdAt:Date.now() });
  input.value = "";
  save();
  render();
}
function toggleTask(taskId){
  const t = state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.completed = !t.completed;
  save(); render();
}
function removeTask(taskId){
  state.tasks = state.tasks.filter(t=>t.id!==taskId);
  if(state.selectedTaskId === taskId) state.selectedTaskId = "";
  save(); render();
}
function removeBrainDump(entryId){
  state.brainDumps = state.brainDumps.filter(b=>b.id!==entryId);
  save(); render();
}
function copyPreviousDay(){
  const dates = [...new Set(state.tasks.map(t=>t.date))].sort();
  const i = dates.indexOf(state.selectedDate);
  const prev = i > 0 ? dates[i-1] : null;
  if(!prev) return;
  const prevTasks = state.tasks.filter(t=>t.date===prev);
  prevTasks.forEach((t, idx)=>state.tasks.unshift({ ...t, id:id(), date:state.selectedDate, completed:false, createdAt:Date.now()+idx }));
  save(); render();
}

document.getElementById("startFlowBtn").addEventListener("click", startFlow);
document.getElementById("addTaskBtn").addEventListener("click", addTask);
document.getElementById("taskInput").addEventListener("keydown", e=>{ if(e.key==="Enter") addTask(); });
document.getElementById("selectedDate").addEventListener("change", e=>{ state.selectedDate=e.target.value; render(); });

load();
render();
